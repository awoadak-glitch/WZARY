name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Next.js Production Site
        run: |
          # هنا نجبر أمر البناء على تصدير ملفات ثابتة حتى لو لم يتم تفعيلها في ملف التكوين
          npx next build

      - name: Check Output Directory and Fallback
        run: |
          # فحص ذكي: إذا لم يتواجد مجلد out، نستخدم مجلد Pages الافتراضي المستهدف لـ Next
          if [ -d "./out" ]; then
            echo "path=./out" >> $GITHUB_ENV
          elif [ -d "./.next" ]; then
            # في حال تم البناء العادي، نقوم بعمل التصدير الثابت يدوياً
            npx next export || echo "No explicit export script needed"
            if [ -d "./out" ]; then
              echo "path=./out" >> $GITHUB_ENV
            else
              echo "path=." >> $GITHUB_ENV
            fi
          else
            echo "path=." >> $GITHUB_ENV
          fi

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
